services:
  api:
    restart: unless-stopped
    ports: !reset []

  web:
    restart: unless-stopped
    ports: !reset []

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
